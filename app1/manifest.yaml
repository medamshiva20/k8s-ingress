apiVersion: apps/v1
kind: Deployment
metadata:
 name: app1
 labels:
  project: roboshop
  tier: frontend
  component: app1
spec:
 replicas: 2
 selector:
  matchLabels:
   project: roboshop
   tier: frontend
   component: app1
 template:
  metadata:
   labels:
    project: roboshop
    tier: frontend
    component: app1
  spec:
   containers:
    - name: app1
      image: sivamedam/app:1.0.0
---
apiVersion: v1
kind: Service
metadata:
 name: app1
 labels:
  project: roboshop
  tier: frontend
  component: app1
spec:
 type: ClusterIP
 selector:
  project: roboshop
  tier: frontend
  component: app1
 ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
 name: app1
 annotations:
  alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
  alb.ingress.kubernetes.io/certificate-arn: 'arn:aws:acm:us-east-1:963947739142:certificate/95fb8374-97ca-4a93-b9df-0ff52a13451a'
  alb.kubernetes.io/scheme: internet-facing
  alb.kubernetes.io/tags: Environment=Dev,project=roboshop
  alb.kubernetes.io/target-type: ip 
spec:
 ingressClassName: alb
 rules:
  - host: app1.sivadevops.in
    http:
     paths:
      - pathType: prefix
        path: "/"
        backend:
         service:
          name: app1
          port:
           number: 80
       